<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyLearn — Изучение Python</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg: #ffffff;
  --sidebar-bg: #f8faff;
  --border: #e2e8f0;
  --primary: #2563eb;
  --primary-light: #eff6ff;
  --primary-dark: #1d4ed8;
  --text: #1e293b;
  --text-muted: #64748b;
  --text-light: #94a3b8;
  --tag-bg: #f1f5f9;
  --note-bg: #eff6ff;
  --warn-bg: #fffbeb;
  --warn: #f59e0b;
  --sidebar-w: 272px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
}

/* ── LAYOUT ── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-top {
  padding: 22px 20px 0;
  flex-shrink: 0;
}
.logo { font-size: 20px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
.logo-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; margin-bottom: 16px; }
.tab-row {
  display: flex; gap: 4px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1; padding: 7px 10px;
  font-size: 13px; font-weight: 500; font-family: inherit;
  border: 1px solid var(--border); border-radius: 6px;
  background: transparent; color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
}
.tab-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.tab-btn:hover:not(.active) { background: var(--border); color: var(--text); }

.chapter-list { flex: 1; overflow-y: auto; padding: 8px 0 16px; }
.chapter-list::-webkit-scrollbar { width: 4px; }
.chapter-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.chapter-hd {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 20px; cursor: pointer; user-select: none;
  font-size: 13px; font-weight: 600; color: var(--text);
  transition: background 0.1s;
}
.chapter-hd:hover { background: rgba(0,0,0,0.04); }
.ch-num {
  font-size: 10px; font-weight: 700; color: var(--primary);
  background: var(--primary-light); padding: 2px 7px;
  border-radius: 10px; min-width: 28px; text-align: center; flex-shrink: 0;
}
.ch-arr { margin-left: auto; font-size: 10px; color: var(--text-light); transition: transform 0.2s; }
.chapter-item.open .ch-arr { transform: rotate(90deg); }
.sec-list { display: none; }
.chapter-item.open .sec-list { display: block; }
.sec-link {
  display: block; padding: 6px 20px 6px 50px;
  font-size: 13px; color: var(--text-muted);
  cursor: pointer; transition: all 0.1s;
  border-left: 2px solid transparent; margin-left: 0;
}
.sec-link:hover { color: var(--text); background: rgba(37,99,235,0.04); }
.sec-link.active { color: var(--primary); border-left-color: var(--primary); background: var(--primary-light); font-weight: 500; }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.top-bar {
  padding: 11px 48px; border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
  background: var(--bg); position: sticky; top: 0; z-index: 10;
  min-height: 44px; display: flex; align-items: center;
}
.top-bar a { color: var(--primary); cursor: pointer; text-decoration: none; }
.top-bar a:hover { text-decoration: underline; }
.content-area { padding: 48px; max-width: 840px; }

/* ── HOME ── */
.home-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--primary-light); color: var(--primary);
  font-size: 12px; font-weight: 600; padding: 4px 12px;
  border-radius: 20px; margin-bottom: 20px;
}
.home-title {
  font-size: 38px; font-weight: 700; line-height: 1.15;
  letter-spacing: -1px; margin-bottom: 14px;
}
.home-title span { color: var(--primary); }
.home-desc { font-size: 16px; color: var(--text-muted); max-width: 580px; line-height: 1.7; margin-bottom: 36px; }
.about-card {
  background: var(--primary-light); border: 1px solid #bfdbfe;
  border-radius: 12px; padding: 26px 28px;
  display: flex; gap: 18px; align-items: flex-start; margin-bottom: 48px;
}
.about-av {
  width: 48px; height: 48px; background: var(--primary); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.about-text h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.about-text p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }

.grid-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; }
.course-card {
  border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 20px; cursor: pointer; transition: all 0.15s;
}
.course-card:hover {
  border-color: var(--primary); background: var(--primary-light);
  box-shadow: 0 4px 12px rgba(37,99,235,0.1); transform: translateY(-1px);
}
.cc-num { font-size: 11px; font-weight: 700; color: var(--primary); letter-spacing: 0.5px; margin-bottom: 6px; }
.cc-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.cc-count { font-size: 12px; color: var(--text-muted); }

/* ── SECTION CONTENT ── */
.sec-chapter-label {
  font-size: 12px; font-weight: 600; color: var(--primary);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
}
.sec-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 28px; line-height: 1.2; }

.cb h2 { font-size: 19px; font-weight: 700; margin: 32px 0 12px; }
.cb h3 { font-size: 16px; font-weight: 600; margin: 24px 0 8px; }
.cb p { margin-bottom: 14px; line-height: 1.75; }
.cb ul, .cb ol { margin: 10px 0 18px 22px; }
.cb li { margin-bottom: 6px; line-height: 1.65; }
.cb code {
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  background: var(--tag-bg); color: #c026d3; padding: 1px 6px; border-radius: 4px;
}
.cb strong { font-weight: 600; }
.cb table { width: 100%; border-collapse: collapse; margin: 16px 0 20px; font-size: 14px; }
.cb th { background: var(--tag-bg); padding: 9px 14px; text-align: left; font-weight: 600; border: 1px solid var(--border); }
.cb td { padding: 9px 14px; border: 1px solid var(--border); }
.cb td code { font-size: 12px; }

.note {
  background: var(--note-bg); border-left: 3px solid var(--primary);
  padding: 14px 16px; border-radius: 0 8px 8px 0; margin: 18px 0; font-size: 14px;
}
.note-lbl { font-weight: 600; color: var(--primary); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.note p { margin: 0; }
.warn { background: var(--warn-bg); border-left-color: var(--warn); }
.warn .note-lbl { color: var(--warn); }

/* ── CODE BLOCK ── */
.code-block { margin: 18px 0; border-radius: 10px; overflow: hidden; border: 1px solid #1e3a5f; }
.code-hd {
  background: #1e293b; padding: 9px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.code-lang { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; font-family: 'JetBrains Mono', monospace; }
.code-copy {
  font-size: 11px; color: #64748b; cursor: pointer;
  border: none; background: transparent; font-family: inherit;
  padding: 2px 8px; border-radius: 4px; transition: all 0.15s;
}
.code-copy:hover { background: #334155; color: #94a3b8; }
.code-copy.copied { color: #10b981; }
.code-block pre { margin: 0 !important; border-radius: 0 !important; }
.code-block pre code.hljs { font-family: 'JetBrains Mono', monospace !important; font-size: 13.5px !important; padding: 18px !important; }

/* ── NAV BUTTONS ── */
.sec-nav { display: flex; justify-content: space-between; margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); gap: 12px; }
.nav-btn {
  display: flex; flex-direction: column; gap: 3px;
  padding: 12px 18px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; background: transparent; font-family: inherit;
  transition: all 0.15s; text-align: left; max-width: 280px;
}
.nav-btn:hover { border-color: var(--primary); background: var(--primary-light); }
.nav-btn-lbl { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.nav-btn-title { font-size: 13px; font-weight: 600; color: var(--text); }
.nav-btn.next { text-align: right; margin-left: auto; }
.nav-spacer { flex: 1; }

/* ── WATERMARK ── */
.sidebar-wmark {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-light);
  flex-shrink: 0;
  line-height: 1.5;
}
.sidebar-wmark a { color: var(--primary); text-decoration: none; opacity: 0.7; }
.sidebar-wmark a:hover { opacity: 1; }

/* ── ENGLISH PAGE ── */
.english-wrap {
  display: flex; gap: 32px; align-items: flex-start;
  padding: 40px 48px; max-width: none;
}
.english-left {
  flex: 1; min-width: 0;
}
.english-left h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
.english-left p { color: var(--text-muted); font-size: 15px; line-height: 1.65; margin-bottom: 16px; }
.eng-badge { display: inline-block; background: var(--warn-bg); color: var(--warn); font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 20px; border: 1px solid #fde68a; }
.english-features { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; }
.eng-feat {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 14px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--tag-bg);
}
.eng-feat-icon { font-size: 20px; flex-shrink: 0; }
.eng-feat-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.eng-feat-desc { font-size: 12px; color: var(--text-muted); }

/* ── WORD GENERATOR ── */
.word-gen {
  width: 340px; min-width: 300px; flex-shrink: 0;
  border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.wg-header {
  background: var(--primary); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.wg-title { font-size: 13px; font-weight: 600; color: #fff; }
.wg-subtitle { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 1px; }
.wg-body { padding: 22px 20px; }
.wg-word { font-size: 32px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; margin-bottom: 4px; }
.wg-trans { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; }
.wg-pos { display: inline-block; font-size: 11px; font-weight: 600; color: var(--primary); background: var(--primary-light); padding: 2px 9px; border-radius: 10px; margin-bottom: 14px; }
.wg-ru { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
.wg-divider { height: 1px; background: var(--border); margin: 0 0 16px; }
.wg-usage-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; }
.wg-example {
  display: flex; gap: 10px; margin-bottom: 10px;
  padding: 10px 12px; border-radius: 7px; background: var(--tag-bg);
  font-size: 13px; line-height: 1.55;
}
.wg-ex-flag { font-size: 16px; flex-shrink: 0; }
.wg-ex-text { color: var(--text); }
.wg-usage-note { font-size: 12px; color: var(--text-muted); line-height: 1.55; margin-top: 10px; padding: 10px 12px; background: var(--note-bg); border-radius: 7px; border-left: 3px solid var(--primary); }
.wg-footer { padding: 0 20px 18px; }
.wg-btn {
  width: 100%; padding: 10px; font-size: 13px; font-weight: 600;
  font-family: inherit; background: var(--primary); color: #fff;
  border: none; border-radius: 8px; cursor: pointer; transition: background 0.15s;
}
.wg-btn:hover { background: var(--primary-dark); }
.wg-counter { text-align: center; font-size: 11px; color: var(--text-light); margin-top: 8px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .content-area { padding: 24px; }
  .home-title { font-size: 26px; }
  .course-grid { grid-template-columns: 1fr 1fr; }
  .top-bar { padding: 11px 24px; }
}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="logo">PyLearn</div>
    <div class="logo-sub">Интерактивный курс программирования</div>
  </div>
  <div class="tab-row">
    <button class="tab-btn active" id="tabPython" onclick="switchTab('python')">Python</button>
    <button class="tab-btn" id="tabEnglish" onclick="switchTab('english')">English</button>
  </div>
  <div class="chapter-list" id="chapterList"></div>
  <div class="sidebar-wmark">
    Создано с помощью <a href="https://claude.ai" target="_blank">Claude</a> · 2026
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="top-bar" id="topBar"></div>
  <div class="content-area" id="contentArea"></div>
</div>

</div>
<script>
// ─── COURSE DATA ───────────────────────────────────────────────────────────────
const COURSE = [
  {
    id: 'ch1', num: '01', title: 'Введение в Python',
    sections: [
      {
        id: 's1-1', title: 'Что такое Python?',
        html: `<p>Python — высокоуровневый язык программирования общего назначения, созданный <strong>Гвидо ван Россумом</strong> в 1991 году. Он известен своим чистым синтаксисом, читаемостью кода и огромной экосистемой библиотек.</p>
<h2>Где применяется Python?</h2>
<ul>
  <li><strong>Веб-разработка</strong> — Django, Flask, FastAPI</li>
  <li><strong>Наука о данных и ИИ</strong> — NumPy, Pandas, TensorFlow, PyTorch</li>
  <li><strong>Автоматизация</strong> — скрипты, боты, парсеры сайтов</li>
  <li><strong>DevOps и системное администрирование</strong></li>
  <li><strong>Кибербезопасность</strong> — тестирование на проникновение</li>
  <li><strong>Разработка игр</strong> — Pygame</li>
</ul>
<h2>Преимущества Python</h2>
<ul>
  <li>Простой и читаемый синтаксис — код похож на обычный текст</li>
  <li>Огромное сообщество и документация</li>
  <li>Более 400 000 библиотек на PyPI</li>
  <li>Кроссплатформенный: Windows, macOS, Linux</li>
  <li>Одна из самых востребованных специализаций на рынке труда</li>
</ul>
<div class="note"><div class="note-lbl">Интересный факт</div><p>Название «Python» придумано не в честь змеи, а в честь британского комедийного шоу «Летающий цирк Монти Пайтона».</p></div>`,
        examples: [{ label: 'Первая программа', code: `# Самая первая программа на Python
print("Привет, мир!")
print("Меня зовут Александр, я изучаю Python!")` }]
      },
      {
        id: 's1-2', title: 'Установка Python',
        html: `<p>Для работы с Python необходимо установить интерпретатор. Всегда используйте актуальную версию Python 3 (Python 2 больше не поддерживается).</p>
<h2>Шаги установки</h2>
<ol>
  <li>Перейдите на официальный сайт <code>python.org</code></li>
  <li>Скачайте установщик для вашей ОС (Windows, macOS или Linux)</li>
  <li>При установке на Windows обязательно поставьте галочку <strong>«Add Python to PATH»</strong></li>
  <li>Проверьте установку в терминале</li>
</ol>
<h2>Редакторы кода</h2>
<ul>
  <li><strong>VS Code</strong> — бесплатный, лёгкий, популярный</li>
  <li><strong>PyCharm</strong> — профессиональная IDE для Python</li>
  <li><strong>Jupyter Notebook</strong> — удобен для науки о данных</li>
  <li><strong>IDLE</strong> — встроенная среда, идеальна для новичков</li>
</ul>
<div class="note"><div class="note-lbl">Совет</div><p>Для быстрого старта можно использовать онлайн-среды: <code>replit.com</code>, <code>trinket.io</code> или <code>colab.research.google.com</code> — никакой установки не нужно.</p></div>`,
        examples: [{ label: 'Проверка версии Python', code: `# В терминале выполните:
# python --version   или   python3 --version

# Запуск интерактивного интерпретатора (REPL):
# python

# Запуск скрипта:
# python my_script.py` }]
      },
      {
        id: 's1-3', title: 'Первая программа',
        html: `<p>Традиционно первая программа выводит текст «Hello, World!». В Python это делается одной строкой. Разберём её структуру.</p>
<h2>Функция print()</h2>
<p>Функция <code>print()</code> выводит данные в консоль. Она может принимать несколько значений через запятую.</p>
<h2>Комментарии</h2>
<p>Комментарии — строки, которые Python игнорирует. Они нужны для пояснений в коде. В Python комментарий начинается с символа <code>#</code>.</p>
<div class="note"><div class="note-lbl">Важно</div><p>Python чувствителен к отступам. Неправильные отступы вызывают ошибку <code>IndentationError</code>. Используйте 4 пробела (стандарт PEP 8).</p></div>`,
        examples: [
          { label: 'Hello, World!', code: `print("Hello, World!")  # выводит текст
print("Привет,", "мир!")  # несколько аргументов
print(42)           # вывод числа
print(3.14)         # вывод дробного числа` },
          { label: 'Комментарии', code: `# Это однострочный комментарий
print("Программа запущена")  # комментарий после кода

# Многострочный комментарий
# можно написать несколько
# строк подряд с решёткой

"""
Тройные кавычки тоже используются
для многострочных пояснений (docstrings)
"""` }
        ]
      }
    ]
  },
  {
    id: 'ch2', num: '02', title: 'Переменные и типы данных',
    sections: [
      {
        id: 's2-1', title: 'Переменные',
        html: `<p>Переменная — это имя, которое ссылается на значение в памяти. В Python переменные создаются при первом присваивании значения — объявлять тип заранее не нужно.</p>
<h2>Правила именования</h2>
<ul>
  <li>Только буквы, цифры и знак подчёркивания <code>_</code></li>
  <li>Не должно начинаться с цифры</li>
  <li>Регистр важен: <code>name</code> и <code>Name</code> — разные переменные</li>
  <li>Нельзя использовать зарезервированные слова: <code>if</code>, <code>for</code>, <code>class</code> и т.д.</li>
</ul>
<h2>Стиль именования (PEP 8)</h2>
<ul>
  <li><strong>snake_case</strong> — для переменных и функций: <code>user_name</code>, <code>total_price</code></li>
  <li><strong>UPPER_CASE</strong> — для констант: <code>MAX_SIZE</code>, <code>PI</code></li>
  <li><strong>PascalCase</strong> — для классов: <code>UserProfile</code></li>
</ul>`,
        examples: [{ label: 'Создание переменных', code: `name = "Александр"
age = 24
height = 1.80
is_developer = True

# Несколько переменных за раз
x, y, z = 1, 2, 3

# Одно значение нескольким переменным
a = b = c = 0

print(name, age, height)
print(type(name))   # <class 'str'>
print(type(age))    # <class 'int'>` }]
      },
      {
        id: 's2-2', title: 'Числа: int и float',

// Flat list of all sections for prev/next navigation
function flatSections() {
  const result = [];
  COURSE.forEach(ch => ch.sections.forEach(sec => result.push({ ch, sec })));
  return result;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentTab = 'python';
let currentSectionId = null;
let openChapters = new Set(['ch1']);

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('chapterList');
  list.innerHTML = '';
  COURSE.forEach(ch => {
    const item = document.createElement('div');
    item.className = 'chapter-item' + (openChapters.has(ch.id) ? ' open' : '');
    item.id = 'chitem-' + ch.id;

    const hd = document.createElement('div');
    hd.className = 'chapter-hd';
    hd.innerHTML = `<span class="ch-num">${ch.num}</span><span>${ch.title}</span><span class="ch-arr">▶</span>`;
    hd.onclick = () => toggleChapter(ch.id);

    const secList = document.createElement('div');
    secList.className = 'sec-list';
    ch.sections.forEach(sec => {
      const link = document.createElement('div');
      link.className = 'sec-link' + (sec.id === currentSectionId ? ' active' : '');
      link.id = 'slink-' + sec.id;
      link.textContent = sec.title;
      link.onclick = () => navigate(ch.id, sec.id);
      secList.appendChild(link);
    });

    item.appendChild(hd);
    item.appendChild(secList);
    list.appendChild(item);
  });
}

function toggleChapter(chId) {
  if (openChapters.has(chId)) {
    openChapters.delete(chId);
  } else {
    openChapters.add(chId);
  }
  buildSidebar();
}

// ─── TAB SWITCH ───────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabPython').classList.toggle('active', tab === 'python');
  document.getElementById('tabEnglish').classList.toggle('active', tab === 'english');

  if (tab === 'english') {
    document.getElementById('chapterList').style.display = 'none';
    renderEnglish();
  } else {
    document.getElementById('chapterList').style.display = '';
    resetContentArea();
    if (currentSectionId) {
      const flat = flatSections();
      const found = flat.find(x => x.sec.id === currentSectionId);
      if (found) renderSection(found.ch, found.sec);
      else renderHome();
    } else {
      renderHome();
    }
  }
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function navigate(chId, secId) {
  currentSectionId = secId;
  openChapters.add(chId);
  buildSidebar();
  const ch = COURSE.find(c => c.id === chId);
  const sec = ch.sections.find(s => s.id === secId);
  renderSection(ch, sec);
  document.querySelector('.main').scrollTo(0, 0);
}

function goHome() {
  currentSectionId = null;
  buildSidebar();
  renderHome();
}

// ─── RENDER HOME ──────────────────────────────────────────────────────────────

  document.getElementById('topBar').innerHTML = '<a onclick="goHome()">PyLearn</a>';

// ─── RENDER SECTION ───────────────────────────────────────────────────────────
function renderSection(ch, sec) {
  const flat = flatSections();
  const idx = flat.findIndex(x => x.sec.id === sec.id);
  const prev = flat[idx - 1];
  const next = flat[idx + 1];

  document.getElementById('topBar').innerHTML =
    `<a onclick="goHome()">PyLearn</a> &nbsp;/&nbsp; Глава ${ch.num} &nbsp;/&nbsp; ${sec.title}`;

  const examples = (sec.examples || []).map(ex => codeBlock(ex.label, ex.code)).join('');

  const prevBtn = prev
    ? `<button class="nav-btn" onclick="navigate('${prev.ch.id}','${prev.sec.id}')">
        <span class="nav-btn-lbl">← Назад</span>
        <span class="nav-btn-title">${prev.sec.title}</span>
       </button>`
    : `<div></div>`;

  const nextBtn = next
    ? `<button class="nav-btn next" onclick="navigate('${next.ch.id}','${next.sec.id}')">
        <span class="nav-btn-lbl">Далее →</span>
        <span class="nav-btn-title">${next.sec.title}</span>
       </button>`
    : `<div></div>`;

  document.getElementById('contentArea').innerHTML = `
    <div>
      <div class="sec-chapter-label">Глава ${ch.num} — ${ch.title}</div>
      <h1 class="sec-title">${sec.title}</h1>
      <div class="cb">${sec.html}</div>
      ${examples}
      <div class="sec-nav">${prevBtn}${nextBtn}</div>
    </div>
  `;

  document.querySelectorAll('.code-block pre code').forEach(el => hljs.highlightElement(el));
}

  wordIdx = (wordIdx + 1) % WORDS.length;

  const w = WORDS[wordIdx];

  document.getElementById('wg-ru').textContent = w.ru;
  document.getElementById('wg-en-ex').textContent = w.en_ex;
  document.getElementById('wg-ru-ex').textContent = w.ru_ex;
  document.getElementById('wg-note').textContent = w.note;
  document.getElementById('wg-counter').textContent = `Слово ${wordIdx + 1} из ${WORDS.length}`;
}

// ─── CODE BLOCK ───────────────────────────────────────────────────────────────
function codeBlock(label, code) {
  const id = 'cb-' + Math.random().toString(36).slice(2, 8);
  const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `
    <div class="code-block">
      <div class="code-hd">
        <span class="code-lang">${label}</span>
        <button class="code-copy" id="${id}" onclick="copyCode(this)">Копировать</button>
      </div>
      <pre><code class="language-python">${escaped}</code></pre>
    </div>`;
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Скопировано!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Копировать'; btn.classList.remove('copied'); }, 2000);
  });
}
